name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Build CLI with @codesesh/core bundled in (self-contained)
      - run: pnpm --filter codesesh run release
        env:
          BUNDLE_CORE: true

      # Remove workspace-only deps from published package.json
      - name: Remove @codesesh/core from dependencies
        working-directory: packages/cli
        run: node -e "const p=require('./package.json');delete p.dependencies['@codesesh/core'];require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: packages/cli

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
